[platformio]
default_envs = clawstick-m5stickc-plus
description = Clawstick firmware mainline

[env]
platform = espressif32
board = m5stick-c
framework = arduino
monitor_speed = 115200
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 160000000L
build_src_filter = +<*> +<ui/> +<ui/screens/> +<ui/overlays/>
build_flags =
    -DCORE_DEBUG_LEVEL=0
; AnimatedGIF pinned to a single point release so default and bench envs
; build against identical decoder sources. Was `^2.1.1` which resolves to
; different patches across envs (2.2.1 vs 2.2.2) and skews L0a-2 numbers.
; Bump deliberately after re-running bench.
lib_deps =
    m5stack/M5StickCPlus
    bitbank2/AnimatedGIF @ 2.2.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:clawstick-m5stickc-plus]
build_flags =
    ${env.build_flags}

[env:compat-claude-m5stickc-plus]
build_flags =
    ${env.build_flags}
    -DCLAWSTICK_COMPAT_CLAUDE_NAME=1

[env:clawstick-bench-heap]
; L0a-2 integrated bench. Identical to clawstick-m5stickc-plus except it
; activates xferPublishBenchHeap() once per second from the main loop.
; Publishes {"bench":"heap",...} JSON to both Serial and BLE so the sidecar
; log can derive heap-min / largest-min / effective fps over the 5-minute
; window plan §5 L0a-2 requires.
build_flags =
    ${env.build_flags}
    -DCLAWSTICK_BENCH_HEAP=1
